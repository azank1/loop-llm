    <text x="16" y="60" class="term">============================================================</text>
    <text x="16" y="78" class="term">Cold start: no history yet, so the controller falls back to a</text>
    <text x="16" y="96" class="term">task-type default and stops the loop the moment progress is good</text>
    <text x="16" y="114" class="term">enough or plateaus.</text>
    <text x="16" y="132" class="term"></text>
    <text x="16" y="150" class="term">=== Loop 5aa881d792a8 (task_type=bugfix) ===</text>
    <text x="16" y="168" class="term">Suggested budget: 3 step(s) | threshold 0.80 | confidence 0.00 (from 0 past loops)</text>
    <text x="16" y="186" class="term">  step  1 | 0.45 |#########           | -&gt; CONTINUE: Keep going: step 1/3, score=0.450 below threshold 0.80</text>
    <text x="16" y="204" class="term">  step  2 | 0.85 |#################   | -&gt; STOP: Goal reached: score=0.850 &gt;= threshold 0.80 at step 2</text>
    <text x="16" y="222" class="term">  learned: optimal_depth=2.0 converge_rate=0.667 (obs=1)</text>
    <text x="16" y="240" class="term"></text>
    <text x="16" y="258" class="term">=== Loop 31b428dc5c8b (task_type=bugfix) ===</text>
    <text x="16" y="276" class="term">Suggested budget: 3 step(s) | threshold 0.80 | confidence 0.09 (from 1 past loops)</text>
    <text x="16" y="294" class="term">  step  1 | 0.50 |##########          | -&gt; CONTINUE: Keep going: step 1/3, score=0.500 below threshold 0.80</text>
